name: Setup
description: Checks out code, installs pnpm, sets up Node.js, restores Nx cache, and installs dependencies

inputs:
  node-version:
    description: Node.js version
    required: true
  nx-cache-key:
    description: Cache key prefix for Nx cache
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Use pnpm
      uses: pnpm/action-setup@v5

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Restore Nx cache
      uses: actions/cache@v5
      with:
        path: .nx
        key: ${{ inputs.nx-cache-key }}-${{ hashFiles('**/nx.json') }}
        restore-keys: |
          ${{ inputs.nx-cache-key }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install
